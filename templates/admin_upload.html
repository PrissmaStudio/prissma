<!DOCTYPE html>
<html lang="{{ current_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ _('Upload - Prissma Studio') }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        :root {
            --acc: #4285f4;
            --bg-dark: #08080c;
            --card-bg: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.12);
            --txt: #ffffff;
            --header-h: 110px;
        }

        body {
            color: var(--txt);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: var(--header-h);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(8, 8, 12, 0.9);
            backdrop-filter: blur(30px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }

        .header-capsule {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 40px;
            padding: 0 20px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid var(--border);
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-decoration: none;
            transition: 0.3s;
        }

        .header-capsule:hover {
            background: var(--acc);
            border-color: var(--acc);
        }

        .upload-container {
            max-width: 860px;
            margin: 0 auto;
            padding: calc(var(--header-h) + 30px) 20px 40px;
        }

        .upload-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 28px;
        }

        .upload-card h2 {
            margin-top: 0;
            margin-bottom: 24px;
            text-align: center;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            color: var(--txt);
            font-size: 16px;
        }

        .file-input-wrapper {
            position: relative;
            margin-bottom: 16px;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-input-label {
            display: block;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            text-align: center;
            color: rgba(255, 255, 255, 0.75);
            cursor: pointer;
            transition: 0.25s;
        }

        .file-input-label:hover {
            border-color: var(--acc);
            background: rgba(66, 133, 244, 0.1);
        }

        .file-list {
            margin-top: 10px;
            max-height: 220px;
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--acc);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.25s;
        }

        .submit-btn:hover {
            background: #357ae8;
        }

        .back-link {
            display: inline-block;
            margin-top: 16px;
            color: var(--acc);
            text-decoration: none;
            font-weight: 500;
        }
    </style>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/site-refresh.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile-ux.css') }}">
    <script defer src="{{ url_for('static', filename='js/mobile-ux.js') }}"></script>
</head>
<body class="admin-page">
    <header class="admin-header">
        <div class="header-left-block" style="display: flex; align-items: center; gap: 25px;">
            <a href="/"><img src="{{ url_for('static', filename='img/optimized/Untitled design - 2.webp') }}" onerror="this.onerror=null;this.src='{{ url_for('static', filename='img/Untitled design - 2.png') }}';" alt="Logo" style="height: 55px;"></a>
            <nav class="header-nav" style="display: flex; gap: 12px; align-items: center;">
                <a href="/gallery" class="header-capsule">← {{ _('Gallery') }}</a>
                <a href="/admin/dashboard" class="header-capsule">{{ _('Dashboard') }}</a>
                <a href="/admin/upload" class="header-capsule" style="background: var(--acc);">{{ _('Upload Files') }}</a>
                <a href="/admin/folder-security" class="header-capsule">🔒 {{ _('Folder Security') }}</a>
            </nav>
        </div>
        <div class="header-right-block" style="display: flex; align-items: center; gap: 15px;">
            <a href="/logout" class="header-capsule" style="border-color: #ff6b6b; color: #ff6b6b !important;">{{ _('Logout') }}</a>
        </div>
    </header>

    <div class="upload-container">
        <div class="upload-card">
            <h2>{{ _('Upload new files') }}</h2>
            <form method="POST" enctype="multipart/form-data" id="upload-form">
                <div class="form-group">
                    <label for="folder_name">{{ _('Folder name:') }}</label>
                    <input type="text" id="folder_name" name="folder_name" placeholder="{{ _('ex: wedding_event') }}" required>
                </div>

                <div class="file-input-wrapper">
                    <input type="file" id="files" name="files" multiple accept="image/*,video/*" onchange="updateFileList()">
                    <label for="files" class="file-input-label">
                        📁 {{ _('Click here to select files') }}<br>
                        <small>{{ _('Or drag and drop files here') }}</small>
                    </label>
                </div>

                <div id="file-list" class="file-list" style="display: none;"></div>
                <button type="submit" class="submit-btn">{{ _('Upload files') }}</button>
            </form>

            <a href="/admin/dashboard" class="back-link">← {{ _('Back to dashboard') }}</a>
        </div>
    </div>

    <script>
        function updateFileList() {
            const input = document.getElementById('files');
            const list = document.getElementById('file-list');
            const files = input.files;

            if (files.length > 0) {
                list.style.display = 'block';
                list.innerHTML = '<h4 style="margin-bottom: 10px;">{{ _('Selected files:') }}</h4>';
                for (let i = 0; i < files.length; i += 1) {
                    const file = files[i];
                    const size = (file.size / (1024 * 1024)).toFixed(2) + ' MB';
                    list.innerHTML += `<div class="file-item"><span>${file.name}</span><span>${size}</span></div>`;
                }
            } else {
                list.style.display = 'none';
            }
        }

        const dropZone = document.querySelector('.file-input-label');
        const fileInput = document.getElementById('files');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach((eventName) => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                e.stopPropagation();
            }, false);
        });

        ['dragenter', 'dragover'].forEach((eventName) => {
            dropZone.addEventListener(eventName, () => {
                dropZone.style.borderColor = 'var(--acc)';
                dropZone.style.background = 'rgba(66, 133, 244, 0.1)';
            }, false);
        });

        ['dragleave', 'drop'].forEach((eventName) => {
            dropZone.addEventListener(eventName, () => {
                dropZone.style.borderColor = 'rgba(255, 255, 255, 0.2)';
                dropZone.style.background = 'rgba(255, 255, 255, 0.05)';
            }, false);
        });

        dropZone.addEventListener('drop', (e) => {
            fileInput.files = e.dataTransfer.files;
            updateFileList();
        }, false);
    </script>
</body>
</html>
