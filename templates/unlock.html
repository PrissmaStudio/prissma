<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ _('Unlock Folder - Prissma Studio') }}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --acc: #4285f4;
            --acc-dark: #3367d6;
            --bg-dark: #08080c;
            --card-bg: #111115;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            margin: 0 auto;
        }

        .unlock-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            backdrop-filter: blur(20px);
            text-align: center;
        }

        .lock-icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .folder-name {
            font-size: 16px;
            color: var(--text-dim);
            margin-bottom: 30px;
            word-break: break-word;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input[type="password"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: var(--acc);
            background: rgba(66, 133, 244, 0.05);
            box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.1);
        }

        .toggle-password {
            position: relative;
        }

        .toggle-password-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 16px;
            padding: 8px;
            transition: color 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-password-btn:hover {
            color: var(--acc);
        }

        .eye-icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .btn-unlock {
            width: 100%;
            padding: 14px 24px;
            background: var(--acc);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Poppins', sans-serif;
        }

        .btn-unlock:hover {
            background: var(--acc-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(66, 133, 244, 0.3);
        }

        .btn-unlock:active {
            transform: translateY(0);
        }

        .btn-unlock:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: rgba(255, 100, 100, 0.1);
            border: 1px solid rgba(255, 100, 100, 0.3);
            color: #ff6464;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 24px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .info-text {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 20px;
            line-height: 1.6;
        }

        .info-text strong {
            color: var(--text-main);
        }

        .loading {
            display: inline-block;
            width: 4px;
            height: 4px;
            background: currentColor;
            border-radius: 50%;
            animation: blink 1.4s infinite;
            margin-left: 4px;
        }

        @keyframes blink {
            0%, 60%, 100% { opacity: 0.5; }
            30% { opacity: 1; }
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/site-refresh.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile-ux.css') }}">
    <script defer src="{{ url_for('static', filename='js/mobile-ux.js') }}"></script>
</head>
<body>
    <div class="container">
        <div class="unlock-card">
            <div class="lock-icon">🔐</div>
            <h1>Folder Protejat</h1>
            <div class="folder-name">{{ folder_name }}</div>

            {% if error %}
                <div class="error-message show">{{ error }}</div>
            {% endif %}

            <form method="POST" id="unlock-form" action="{{ url_for('unlock_folder', folder_name=folder_name) }}">
                <div class="form-group">
                    <label for="access_key">Cheie de Acces</label>
                    <div class="toggle-password">
                        <input 
                            type="password" 
                            id="access_key" 
                            name="access_key" 
                            placeholder="Introduce cheia de acces..." 
                            required 
                            autocomplete="off"
                        >
                        <button type="button" class="toggle-password-btn" onclick="togglePassword()" id="toggle-btn">
                            <svg class="eye-icon" id="eye-open" viewBox="0 0 24 24">
                                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                            </svg>
                            <svg class="eye-icon" id="eye-closed" viewBox="0 0 24 24" style="display: none;">
                                <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92 1.11-1.11c-1.73-4.39-6-7.5-11-7.5-1.55 0-3.03.3-4.38.84l.42.42c1.02-.32 2.08-.66 3.22-.66zm-1.1 2.1c-.34 0-.67.04-1 .11l1.89 1.89c.07-.33.11-.66.11-1zm2.9 2.9c.34 0 .67-.04 1-.11l-1.89-1.89c-.07.33-.11.66-.11 1zM12 17c-2.76 0-5-2.24-5-5 0-.65.13-1.26.36-1.83l-2.92-2.92-1.11 1.11c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l-.42-.42c-1.02.32-2.08.66-3.22.66z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-unlock" id="submit-btn">
                    <span id="btn-text">Deblochează Folderul</span>
                    <span id="btn-loading" class="loading" style="display: none;"></span>
                </button>
            </form>

            <div class="info-text">
                <strong>Informații:</strong>
                <br>Introdu cheia de acces pe care ți-a dat-o administratorul pentru a accesa acest folder.</div>
        </div>
    </div>

    <script>
        // Verifica daca in URL exista un error (ex: link-ul a expirat)
        const url = new URL(window.location.href);
        const invalidLink = '{{ error }}' && '{{ error }}'.includes('{{ _("The link has expired or is invalid!") }}');
        
        function togglePassword() {
            const input = document.getElementById('access_key');
            const eyeOpen = document.getElementById('eye-open');
            const eyeClosed = document.getElementById('eye-closed');
            
            if (input.type === 'password') {
                input.type = 'text';
                eyeOpen.style.display = 'none';
                eyeClosed.style.display = 'block';
            } else {
                input.type = 'password';
                eyeOpen.style.display = 'block';
                eyeClosed.style.display = 'none';
            }
        }

        // Auto-focus pe input
        document.getElementById('access_key').focus();
    </script>
</body>
</html>
