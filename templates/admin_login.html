<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>{{ _('Admin Login - Prissma Studio') }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        .login-card h2 {
            margin-bottom: 30px;
            color: white;
            font-weight: 300;
            letter-spacing: 1px;
        }
        .login-card input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        .login-card input:focus {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }
        
        .btn-group {
            display: flex;
            gap: 12px;
        }

        .btn-submit, .btn-back {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            color: white;
        }

        /* Butonul de Login */
        .btn-submit {
            background: #4285f4;
            box-shadow: 0 4px 15px rgba(66, 133, 244, 0.3);
        }
        .btn-submit:hover {
            background: #357ae8;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(66, 133, 244, 0.4);
        }

        /* Butonul de Back (Anulează) */
        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-back:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateY(-2px);
        }

        .error {
            color: #ff6b6b;
            margin-bottom: 20px;
            font-size: 14px;
            background: rgba(255, 107, 107, 0.1);
            padding: 10px;
            border-radius: 8px;
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/site-refresh.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile-ux.css') }}">
    <script defer src="{{ url_for('static', filename='js/mobile-ux.js') }}"></script>
</head>
<body class="admin-page">
    <div class="login-container">
        <div class="login-card">
            <img src="{{ url_for('static', filename='img/optimized/Untitled design - 2.webp') }}" onerror="this.onerror=null;this.src='{{ url_for('static', filename='img/Untitled design - 2.png') }}';" style="max-width: 140px; margin-bottom: 20px;" alt="Prissma Studio">
            <h2>{{ _('Admin Login') }}</h2>
            
            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <input type="password" name="password" placeholder="{{ _('Password') }}" required autofocus>
                
                <div class="btn-group">
                    <button type="submit" class="btn-submit">{{ _('Login') }}</button>
                    <button type="button" class="btn-back" onclick="window.history.back()">{{ _('Cancel') }}</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
